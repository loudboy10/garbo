#Configuration file for nav2 navigation and docking

#To-Do
#-Adjust robot footprint, load xacro variables from launch file
#-Enable dynamic footprint for picking up objects. See Nav2 docs > footprint.
#---Dynamic footprint can be enabled to change size based on whether carrying an object or not.
#-Tune inflation radius and cost scaling factor in both costmaps
#-Local costmap - max obstacle height? -Set this up for depth cam
#Global costmap - max obstacle height? -Set this up for depth cam
#Try setting always_send_full_costmap to false for better performance?
#Adjust laser min distance to ignore parts of robot structure


#Edits:
#-Added "enable_stamped_cmd_vel: true" to movement nodes to create stamped type twist messages (not default in Jazzy)
#-Set map_server yaml_filename to driveway_edited.yaml
#-Set robot footprint in global and local_costmap
#---Footprint is based on the location of base_link, which is at the bottom, middle, centered between the wheels.
#--It may be too computationally expensive to use the full rectangular footprint in global_costmap. Would need to find solution to move robot radius to center (currently at base-link)
#-Added initial pose settings under amcl
#-Added keepout filter params
#-Velocity smoother: increased max velocity
#-Reduced obstacle_max_range to 1.0 in both costmaps to eliminate lidar/ramp issue
#-Reduced costmap resolution for easier compute.

amcl:
  ros__parameters:
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint" #Ignores the vertical component of base_link
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0 #Default 100! Jeeze thats a lot of wasted compute.
    laser_min_range: -1.0 #Increase to ignore parts of the robot structure
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    set_initial_pose: true #Added inital pose settings.
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

bt_navigator:
  ros__parameters:
    enable_stamped_cmd_vel: true # Manually added parameter
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /demo/odom
    bt_loop_duration: 10 #This is a good candidate for decreasing compute load. Increase thinking time if needed?
    default_server_timeout: 40 #defualt 20ms. This makes it more lag tolerant.
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.

    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    # plugin_lib_names: []


    error_code_name_prefixes:
      - assisted_teleop
      - backup
      - compute_path
      - dock_robot
      - drive_on_heading
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - route
      - spin
      - undock_robot
      - wait


controller_server:
  ros__parameters:
    controller_frequency: 5.0 #Default 20.0. Huge impact on computer load
    odom_topic: /demo/odom
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001 #deault 0.0001m. Small!
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001 #Default 0.0001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    enable_stamped_cmd_vel: true # Manually added parameter

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25 #Change this if bot is jittery once it reaches the goal
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25 #Change this if bot is jittery once it reaches the goal
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController" #This smoothly rolls out and turns towards goal, compute heavy. Try using rotation shim control which is easy point-n-shoot
      #primary_controller: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController #Only needed if Rotation Shim is used above
      #Need to add params section if used.
      time_steps: 15 #Default 56
      model_dt: 0.2 #Default is 0.05s. This needs to match controller frequency in Hz
      batch_size: 2000
      ax_max: 3.0
      ax_min: -3.0
      ay_max: 3.0
      ay_min: -3.0
      az_max: 3.5
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.5 #Max speed. 0.5m/s is about 1.5mph
      vx_min: -0.35
      vy_max: 0.5
      wz_max: 1.9
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics: [
        "ConstraintCritic", "CostCritic", "GoalCritic",
        "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3 #default 5 for both.
      height: 3
      resolution: 0.1 #Just under 4inches.
      #robot_radius: 0.22
      footprint: "[ [0.573, 0.25], [0.573, -0.25], [-0.127, -0.25], [-0.127, 0.25] ]" #FL, FR, RL, RR corners in meters from base_link (x-longitudinal, y-transverse offset)
      filters: ["keepout_filter"]  #Added for keepout mask. Needs to be placed BEFORE the obstacle layer to override it.
      keepout_filter: #Confirm these needs to be BEFORE plugins?
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"
      plugins: ["obstacle_layer","denoise_layer","inflation_layer", "voxel_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          clearing: True
          marking: True
          data_type: "LaserScan"
          max_obstacle_height: 2.0 #How in hell does a lidar know a height??????
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0 #Increase to match hits on the robot body itself
          obstacle_max_range: 1.0 #Default 2.5. Reduced to ignore ramp
          obstacle_min_range: 0.0 #Increase to match hits on the robot body itself
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: true
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.2
        z_voxels: 16
        unknown_threshold: 15
        max_obstacle_height: 2.0
        mark_threshold: 1 #Increase to reduce noise an small objects
        combination_method: 1
        observation_sources: depth_camera #Verify these settings and names are correct
        depth_camera:
          topic: /depth_camera/depth/color/points
          data_type: PointCloud2
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          clearing: False
          marking: True
          raytrace_max_range: 3.0
          raytrace_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0
          obstacle_max_range: 1.0 #Default 2.5. Reduced to ignore ramp
          obstacle_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0
      denoise_layer: #Could be a heavy compute load
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2
        group_connectivty_type: 8      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 2.58
        inflation_radius: 1.75 #Experimental magic number, apparently. Default 0.55
        inflate_unknown: False
        inflate_around_unknown: False
      #static_layer:
      #  plugin: "nav2_costmap_2d::StaticLayer" #Why commented out?
      #  map_subscribe_transient_local: True #Why commented out?
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0 #default 1.0
      publish_frequency: 1.0 #default 1.0
      global_frame: map
      robot_base_frame: base_link
      #robot_radius: 0.35 #Half the length of the robot (0.7m)
      footprint: "[ [0.573, 0.25], [0.573, -0.25], [-0.127, -0.25], [-0.127, 0.25] ]" #FL, FR, RL, RR corners in meters from base_link (x-longitudinal, y-transverse offset)
      resolution: 0.1
      track_unknown_space: true
      rolling_window: false
      #filters: ["keepout_filter"]  #Added for keepout mask. Needs to be placed BEFORE the obstacle layer to override it.
      #keepout_filter:
      #  plugin: "nav2_costmap_2d::KeepoutFilter"
      #  enabled: True
      #  filter_info_topic: "/costmap_filter_info"
      plugins: ["static_layer","obstacle_layer","inflation_layer", "voxel_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabbled: true
        map_subscribe_transient_local: True      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          clearing: True
          marking: True
          data_type: "LaserScan"
          max_obstacle_height: 2.0 #How in hell does a lidar know a height??????
          raytrace_max_range: 3.0
          raytrace_min_range: 0.2 #Increase to match hits on the robot body itself
          obstacle_max_range: 1.0 #Default 2.5. Reduced to ignore ramp
          obstacle_min_range: 0.2 #Increase to match hits on the robot body itself
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        footprint_clearing_enabled: true
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.2
        z_voxels: 10
        unknown_threshold: 15
        max_obstacle_height: 2.0
        mark_threshold: 0 #Increase to reduce noise an small objects
        combination_method: 1
        observation_sources: depth_camera #Verify these settings and names are correct
        depth_camera:
          topic: /depth_camera/depth/color/points
          data_type: PointCloud2
          max_obstacle_height: 2.0
          min_obstacle_height: 0.1
          clearing: False
          marking: True
          raytrace_max_range: 3.0
          raytrace_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0
          obstacle_max_range: 1.0 #Default 2.5. Reduced to ignore ramp
          obstacle_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 2.58
        inflation_radius: 1.75 #Experimental magic number, apparently. Default 0.55
        inflate_unknown: False
        inflate_around_unknown: False
      always_send_full_costmap: True


# The yaml_filename does not need to be specified since it going to be set by defaults in launch.
# If you'd rather set it in the yaml, remove the default "map" value in the nav2_navigation_launch.py
# file & provide full path to map below. If CLI map configuration or launch default is provided, that will be used.
map_server:
  ros__parameters:
    yaml_filename: "/home/indie/garbo_ws/src/garbo/world/driveway_edited.yaml"

#Added for keepout mask
costmap_filter_info_server:
  ros__parameters:
    use_sim_time: true
    type: 0
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base: 0.0
    multiplier: 1.0
filter_mask_server:
  ros__parameters:
    use_sim_time: true
    frame_id: "map"
    topic_name: "/keepout_filter_mask"
    yaml_filename: "/home/indie/garbo_ws/src/garbo/world/driveway_costmap.yaml"

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
      cmd_vel_teleop: /cmd_vel_teleop #added but unused
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.5 #Default 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: true # Manually added parameter

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    global_frame_id: map
    bond_heartbeat_period: 0.1
    stop_on_failure: false #Procceeds to the next objective if one fails
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 10 #seconds

route_server: #Not in default Jazzy params. Leaving it here for now
  ros__parameters:
    # The graph_filepath does not need to be specified since it going to be set by defaults in launch.
    # If you'd rather set it in the yaml, remove the default "graph" value in the launch file(s).
    # file & provide full path to map below. If graph config or launch default is provided, it is used
    # graph_filepath: $(find-pkg-share nav2_route)/graphs/aws_graph.geojson
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

velocity_smoother:
  ros__parameters:
    enable_stamped_cmd_vel: true # Manually added parameter
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 1.0] #(x, y, theta) Increased x-vel from 0.5 to 1.0, reduced turn rate to 1.0 to reduce loss of laser
    min_velocity: [-1.0, 0.0, -1.0] #Increased max reverse x-vel to 1.0 from 0.5
    max_accel: [0.3, 0.0, 3.2] #Decreased x from 2.5 to allow for heavy bot
    max_decel: [-0.3, 0.0, -3.2] #Decreased x from 2.5 to allow for heavy bot
    odom_topic: "/demo/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/demo/cmd_vel_nav"
    enable_stamped_cmd_vel: true # Manually added parameter
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    # and robot footprint for "approach" action type.
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["depth_camera"]
    scan:
      type: "PointCloud2"
      topic: "/depth_camera/depth/color/points"
      min_height: 0.15
      max_height: 2.0
      enabled: True

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    enable_stamped_cmd_vel: true # Manually added parameter
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    rotation_angular_tolerance: 0.05
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    odom_topic: "odom"
    odom_duration: 0.3
    #dock_backwards: true #Depricated param. Use the dock plugin’s dock_direction parameter instead. 
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['home_dock', 'bin_dock', 'placement_dock']
    home_dock: # The home-base charging dock
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true #Apriltag on charging base
      use_battery_status: false # true
      use_stall_detection: false # true
      dock_direction: "backward" # forward/backward
    bin_dock: # For docking to a bin at a non-fixed location
      plugin: 'opennav_docking::SimpleNonChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true #Apriltag on the bin itself
      use_battery_status: false # true
      use_stall_detection: false # true
      dock_direction: "backward" # forward/backward
    placement_dock: #For dropping off a bin next to the house or out on the curb
      plugin: 'opennav_docking::SimpleNonChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true
      #dock_direction: "forward" # Set in docks.yaml because of two different uses.

      external_detection_timeout: 1.0
      #external_detection_translation set per dock in docks.yaml
      filter_coef: 0.1

    # Docks
    dock_database: /home/indie/garbo_ws/src/garbo/config/docks.yaml

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.1 #The distance from the dock pose to ignore collisions. Set to 0.0 when the dock isn't physically contacted.

loopback_simulator:
  ros__parameters:
    enable_stamped_cmd_vel: true # Manually added parameter
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    map_frame_id: "map"
    scan_frame_id: "base_scan"  # tb4_loopback_simulator.launch.py remaps to 'rplidar_link'
    update_duration: 0.02
#    scan_range_min: 0.05 #These arent in default Jazzy params
#    scan_range_max: 30.0
#    scan_angle_min: -3.1415
#    scan_angle_max: 3.1415
#    scan_angle_increment: 0.02617
#    scan_use_inf: true