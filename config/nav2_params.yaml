#Good

#Configuration file for nav2 navigation and docking
#https://github.com/ros-navigation/navigation2/blob/kilted/nav2_bringup/params/nav2_params.yaml

#To-Do
#-Adjust robot footprint, load xacro variables from launch file
#-Enable dynamic footprint for picking up objects. See Nav2 docs > footprint.
#---Dynamic footprint can be enabled to change size based on whether carrying an object or not.
#-Tune inflation radius and cost scaling factor in both costmaps
#-Local costmap - max obstacle height? -Set this up for depth cam
#Global costmap - max obstacle height? -Set this up for depth cam
#Try setting always_send_full_costmap to false for better performance?
#Adjust laser min distance to ignore parts of robot structure

#Many more params available but these are the most important for basic navigation and docking. See Nav2 docs for more details on all available parameters and plugins, especially in the BT Navigator and Controller Server sections which have many options for improving performance and behavior.

amcl:
  ros__parameters:
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint" #Ignores the vertical component of base_link
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0 #Default 100! Jeeze thats a lot of wasted compute.
    laser_min_range: -1.0 #Increase to ignore parts of the robot structure
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    set_initial_pose: true #Added inital pose settings.
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

bt_navigator:
  ros__parameters:
    enable_stamped_cmd_vel: true # Manually added parameter
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /demo/odom
    bt_loop_duration: 30 #This is a good candidate for decreasing compute load. Increase thinking time if needed?
    filter_duration: 0.3
    default_server_timeout: 40 #defualt 20ms. This makes it more lag tolerant.
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1667
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1669
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.

    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    # plugin_lib_names: []


    error_code_name_prefixes:
      - assisted_teleop
      - backup
      - compute_path
      - dock_robot
      - drive_on_heading
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - route
      - spin
      - smoother
      - undock_robot
      - wait


controller_server:
  ros__parameters:
    controller_frequency: 5.0 #Default 20.0. Huge impact on computer load
    odom_topic: /demo/odom
    odom_duration: 0.3 #    Time (s) to buffer odometry commands to estimate the robot speed.
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0 #Seconds to wait for the controller plugin to recover before the action fails. Default 0.0 for disable, -1.0 for infinite
    publish_zero_velocity: true #Whether to publish a zero velocity command on goal exit. This is useful for stopping the robot when a goal terminates
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    speed_limit_topic: "speed_limit" #For use by the Speed Filter, if used.
    enable_stamped_cmd_vel: true #Kilted and newer use TwistStamped by defualt
    bond_heartbeat_period: 0.25 #The lifecycle node bond mechanism publishing period (on the /bond topic). Disabled if inferior or equal to 0.0.
    search_window: 2.0 # How far (in meters) along the path the searching algorithm will look for the closest point.
    service_introspection_mode: "disabled"

    progress_checker: #Plugin to check if the robot is making progress towards the goal. If not, it will trigger a recovery behavior or replan. This is important for getting unstuck from obstacles or navigation failures. Adjust parameters to be more or less sensitive to lack of progress.
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25 #Change this if bot is jittery once it reaches the goal
    #  stateful: true
    general_goal_checker:
      stateful: true #Whether to check for XY position tolerance after rotating to goal orientation in case of minor localization changes.
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05 #Default 0.25
      yaw_goal_tolerance: 0.01 #Decreased from default 0.25 Change this if bot is jittery once it reaches the goal
      path_length_tolerance: 1.0 #Distance along the path that the robot can be from the goal and still be considered to have reached it. This is important for getting close enough to the goal when precise navigation is difficult, such as when docking or navigating to a small target. Adjust this based on the expected precision of the robot's navigation and the size of the target.
      stateful: true #Whether to check for XY position tolerance after rotating to goal orientation in case of minor localization changes.    
      symmetric_yaw_tolerance: false #For onmibots with no true front.
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController" #This smoothly rolls out and turns towards goal, compute heavy. Try using rotation shim control which is easy point-n-shoot
      #primary_controller: nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController #Only needed if Rotation Shim is used above
      #Need to add params section if used.
      time_steps: 30 #Default 56
      model_dt: 0.2 #Default 0.05. Generally should match controller frequency; 20hz = 0.05. Can be set lower/slower(larger) but not higher/faster(smaller).
      batch_size: 2000
      ax_max: 3.0 #forward acceleration.
      ax_min: -3.0 #deceleteration / braking
      az_max: 3.5 #Rotational acceleration. Higher helps with responsiveness in turning, especially for docking. Reduce if the bot is too twitchy.
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.5 #Max speed. 0.5m/s is about 1.5mph
      vx_min: -0.35
      wz_max: 1.0 #Max rotational speed. Default 1.9, reduced to 1.0 for better control with laser lag.
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3 #Route cost weights. Lower score is a better route.
      gamma: 0.015 #Cost discount factor. Higher gamma discounts future costs more, making the controller more greedy and responsive, but potentially less optimal. Lower gamma makes the controller more far-sighted and optimal, but potentially less responsive.
      motion_model: "DiffDrive"
      visualize: false #Set to true to visualize the rolled out trajectories in RViz. This can be helpful for tuning the controller and understanding its behavior, but it can also add significant compute load, especially with a high batch size and many time steps.
      regenerate_noises: false #Five syllable words I dont understand. true has high compute load.
      retry_attempt_limit: 2 #Default 1. Number of attempts to find feasible trajectory on failure for soft-resets before reporting total failure.
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: true #Default false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 2.5 #default 5
      publish_frequency: 2.0
      global_frame: odom
      rolling_window: true
      width: 3 #Size of the local costmap in meters. This should be large enough to cover the area around the robot where it needs to detect obstacles for navigation and docking, but not so large that it includes distant obstacles that are not relevant to the robot's immediate path. A good starting point is around 3 meters, but this may need to be adjusted based on the robot's speed, sensor range, and the density of obstacles in the environment.
      height: 3
      resolution: 0.1 #Just under 4inches.
      always_send_full_costmap: true
      robot_base_frame: base_link
      #robot_radius: 0.22
      footprint: "[ [0.573, 0.25], [0.573, -0.25], [-0.127, -0.25], [-0.127, 0.25] ]" #FL, FR, RL, RR corners in meters from base_link (x-longitudinal, y-transverse offset)
      subscribe_to_stamped_footprint: false #Uses PolygonStamped messages instead of Polygon. Useful for carrying bins?      
      plugins: ["obstacle_layer","denoise_layer","inflation_layer"] #, "voxel_layer" Add back once Pointcloud is sorted
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          clearing: true
          marking: true
          data_type: "LaserScan"
          max_obstacle_height: 2.0 #How in hell does a lidar know a height??????
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0 #Increase to eliminate hits on the robot body itself
          obstacle_max_range: 2.5 #Default 2.5. Reduce to 1m to ignore ramp
          obstacle_min_range: 0.0 #Increase to match hits on the robot body itself
#      voxel_layer:
#        plugin: "nav2_costmap_2d::VoxelLayer"
#        enabled: true
#        footprint_clearing_enabled: true
#        publish_voxel_map: false
#        origin_z: 0.0
#        z_resolution: 0.2
#        z_voxels: 16
#        unknown_threshold: 15
#        max_obstacle_height: 2.0
#        mark_threshold: 1 #Increase to reduce noise an small objects
#        combination_method: 1
#        observation_sources: depth_camera #Verify these settings and names are correct
#        depth_camera:
#          topic: /depth_camera/depth/color/points
#          data_type: PointCloud2
#          max_obstacle_height: 2.0
#          min_obstacle_height: 0.1
#          clearing: false
#          marking: true
#          raytrace_max_range: 3.0
#          raytrace_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0
#          obstacle_max_range: 1.0 #Default 2.5. Reduced to ignore ramp
#          obstacle_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0
      denoise_layer: #Could be a heavy compute load
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 2
        group_connectivty_type: 8      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 2.58
        inflation_radius: 1.75 #Experimental magic number, apparently. Default 0.55
        inflate_unknown: false
        inflate_around_unknown: false
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 0.5 #default 1.0
      publish_frequency: 1.0 #default 1.0
      global_frame: map
      resolution: 0.1
      track_unknown_space: true
      rolling_window: false
      always_send_full_costmap: true
      robot_base_frame: base_link
      #robot_radius: 0.35 #Half the length of the robot (0.7m)
      footprint: "[ [0.573, 0.25], [0.573, -0.25], [-0.127, -0.25], [-0.127, 0.25] ]" #FL, FR, RL, RR corners in meters from base_link (x-longitudinal, y-transverse offset)
      footprint_padding: 0.01 #Buffer around the physical footprint
      subscribe_to_stamped_footprint: false #Uses PolygonStamped messages instead of Polygon. Useful for carrying bins?
      plugins: ["static_layer","obstacle_layer","inflation_layer"] #, "voxel_layer Add voxel back once PointCloud is sorted.
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          clearing: true
          marking: true
          data_type: "LaserScan"
          max_obstacle_height: 2.0 #How in hell does a lidar know a height??????
          raytrace_max_range: 3.0
          raytrace_min_range: 0.2 #Increase to match hits on the robot body itself
          obstacle_max_range: 1.0 #Default 2.5. Reduced to ignore ramp
          obstacle_min_range: 0.2 #Increase to match hits on the robot body itself
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
#      voxel_layer:
#        plugin: "nav2_costmap_2d::VoxelLayer"
#        enabled: true
#        footprint_clearing_enabled: true
#        publish_voxel_map: false
#        origin_z: 0.0
#        z_resolution: 0.2
#        z_voxels: 10
#        unknown_threshold: 15
#        max_obstacle_height: 2.0
 #       mark_threshold: 0 #Increase to reduce noise an small objects
  #      combination_method: 1
  #      observation_sources: depth_camera #Verify these settings and names are correct
#        depth_camera:
 #         topic: /depth_camera/depth/color/points
#          data_type: PointCloud2
#          max_obstacle_height: 2.0
#          min_obstacle_height: 0.1
#          clearing: false
#          marking: true
#          raytrace_max_range: 3.0
#          raytrace_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0
 #         obstacle_max_range: 1.0 #Default 2.5. Reduced to ignore ramp
#          obstacle_min_range: 0.05 #Filters out noise right in front of the camera. Default 0.0      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 2.58
        inflation_radius: 1.75 #Experimental magic number, apparently. Default 0.55
        inflate_unknown: false
        inflate_around_unknown: false
      service_introspection_mode: "disabled"


# The yaml_filename does not need to be specified since it going to be set by defaults in launch.
# If you'd rather set it in the yaml, remove the default "map" value in the nav2_navigation_launch.py
# file & provide full path to map below. If CLI map configuration or launch default is provided, that will be used.
map_server:
  ros__parameters:
    yaml_filename: "/home/indie/garbo_ws/src/garbo/world/driveway_edited.yaml"
    topic_name: "map"
    frame_id: "map"
    service_introspection_mode: "disabled"

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
    service_introspection_mode: "disabled"

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    service_introspection_mode: "disabled"
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    costmap_topic: global_costmap/costmap_raw
    footprint_topic: global_costmap/published_footprint
    robot_base_frame: base_link
    transform_tolerance: 0.1
    smoother_plugins: ["simple_smoother", "route_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.00000000001
      max_its: 1000
      refinement_num: 2
      # true for Hybrid A* or State Lattice to not smooth over directional changes
      enforce_path_inversion: true
      do_refinement: true
    route_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.0000000001
      max_its: 1000
      refinement_num: 5
      # false for Route Server or others where smoothing out sharp corners is OK
      enforce_path_inversion: false
      do_refinement: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
      acceleration_limit: 2.5
      deceleration_limit: -2.5
      minimum_speed: 0.10
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: true # Manually added parameter

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false #Whether to fail action task if a single waypoint fails. If false, will continue to next waypoint.
    service_introspection_mode: "disabled"
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 10

route_server:
  ros__parameters:
    # The graph_filepath does not need to be specified since it going to be set by defaults in launch.
    # If you'd rather set it in the yaml, remove the default "graph" value in the launch file(s).
    # file & provide full path to map below. If graph config or launch default is provided, it is used
    # graph_filepath: $(find-pkg-share nav2_route)/graphs/aws_graph.geojson
    base_frame: "base_link" # Robot's base frame
    route_frame: "map" # Global reference frame
    path_density: 0.05 # Density of points for generating the dense nav_msgs/Path from route (m)
    max_iterations: 0 # Maximum number of search iterations, if 0, uses maximum possible
    max_planning_time: 4.0 # Default 2. Maximum planning time (seconds)
    smooth_corners: true # Whether to smooth corners formed by adjacent edges or not
    smoothing_radius: 1.0 # Radius of corner to fit into the corner
    smoothing_angle_threshold: 2.9
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

velocity_smoother:
  ros__parameters:
    enable_stamped_cmd_vel: true # Manually added parameter
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 2.0] #Reduce turn rate from 2.0 to 1.0 if laser cant keep up
    min_velocity: [-0.5, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/demo/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/demo/cmd_vel_nav"
    enable_stamped_cmd_vel: true # Manually added parameter
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    # and robot footprint for "approach" action type.
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"] # "pointcloud"
    scan:
      type: "scan"
      topic: "/scan"
      enabled: true
    #pointcloud: Ignoring pointcloud for now until I can figure out how to rotate it into the proper frame.
    #  type: "PointCloud2"
    #  topic: "/depth_camera/points"
    #  min_height: 0.05
    #  max_height: 2.0
    #  enabled: true

docking_server:
  ros__parameters:
    controller_frequency: 25.0 #Default 50. Control frequency for vision-control loop. Good luck getting this running fast enough with Gazebo and depth camera
    enable_stamped_cmd_vel: true # Manually added parameter
    initial_perception_timeout: 15.0 #Default 5. Timeout (s) to wait to obtain initial perception of the dock.
    wait_charge_timeout: 5.0 #Timeout in seconds to wait to see if charging starts after docking. Only used if use_battery_status is true to detect successful docking.
    dock_approach_timeout: 120.0 #Default 30. Timeout (s) to attempt vision-control approach loop.
    rotate_to_dock_timeout: 10.0 #Timeout (s) to attempt rotate-to-dock loop, if enabled.
    undock_linear_tolerance: 0.05 #Tolerance (m) to exit the undocking control loop at staging pose.
    undock_angular_tolerance: 0.1 #Angular tolerance (rad) to exit undocking loop at staging pose.
    max_retries: 3 #Maximum number of retries to attempt for the entire docking procedure before giving up and reporting failure. Four total.
    base_frame: "base_link" #Robot’s base frame for control law.
    fixed_frame: "odom" #Fixed frame to use, recommended to be a smooth odometry frame not map.
    odom_topic: "odom" #The topic to use for the odometry data when rotate_to_dock is enabled.
    rotation_angular_tolerance: 0.05 #Angular tolerance (rad) to exit the rotation loop when rotate_to_dock is enabled
    dock_prestaging_tolerance: 0.5 #L2 distance in X,Y,Theta from the staging pose to bypass navigation.
    navigator_bt_xml: "" # Behavior Tree to use other than default.
    service_introspection_mode: "disabled"

    # Types of docks
    dock_plugins: ['home_dock', 'bin_dock', 'placement_dock'] #Types of docks to be used. The plugin to use for each dock is set in the dock_database yaml file. Each dock can have its own plugin and parameters, but they are grouped here for organizational purposes since they share many parameters.
    home_dock: # The home-base charging dock
      plugin: 'opennav_docking::SimpleChargingDock'
      use_battery_status: false # true
      use_external_detection_pose: true #Whether to use external detection topic for dock or use the databases’ pose.
      external_detection_timeout: 1.0 #Time (s) to wait without receiving a new detection before considering the detection lost and timing out the approach.
      #external_detection_translation_x: -2.0 #Set per dock, if used, in docks.yaml
      #external_detection_translation_y: -0.5 #Set per dock, if used, in docks.yaml
      #external_detection_rotation_roll: -1.5708 #Set per dock, if used, in docks.yaml
      #external_detection_rotation_pitch: -1.5708# Set per dock, if used, in docks.yaml
      #external_detection_rotation_yaw: 0.0 #Set per dock, if used, in docks.yaml
      filter_coef: 0.1 # Dock external detection method filtering algorithm coefficient.????????
      charging_threshold: 0.5 # Threshold of current in battery state above which isCharging() = true
      use_stall_detection: false #Whether or not to use stall detection for isDocked() or positional threshold.
      #Setting this param empty breaks nav2 if use_stall_detection is false: stall_joint_names:  #Names in joint_states topic of joints to track.
      stall_effort_threshold: 1.0 #Current or motor effort in joint state to trigger isDocked() = true, when use_stall_detection is true.
      docking_threshold: 0.05 #L2 distance in meters and radians to the dock pose at which to consider the robot docked when not using stall or battery detection.
      staging_x_offset: -2.0 #Staging pose will be 0.7m in front of the dock, so the bot can use its internal localization to fine-tune its position for docking instead of relying on perfect initial navigation to the dock.
      staging_yaw_offset: 0.0 #Staging pose angle relative to dock pose (rad). If dock_direction is set to “backward”, this angle must be faced in the opposite direction of the dock pose. However, if rotate_to_dock is enabled, this angle must be facing the same direction as the dock pose because the robot will rotate to the dock pose after detection.
      dock_direction: "forward" # Whether the robot is docking with the dock forward or backward in motion. This is the replacement for the deprecated dock_backwards parameter. Options are “forward” or “backward”.
      rotate_to_dock: false #Enables backward docking without requiring a sensor for detection during the final approach. This may also be paired with sensor detection in the reverse direction as well if available. Note: This parameter is only valid when the dock_direction is set to “backward”.
    bin_dock: # For docking to a bin at a non-fixed location
      plugin: 'opennav_docking::SimpleNonChargingDock'
      use_battery_status: false
      use_external_detection_pose: true
      external_detection_timeout: 1.0
      filter_coef: 0.1
      use_stall_detection: false
      docking_threshold: 0.05
      staging_x_offset: 0.7
      staging_yaw_offset: 0.0
      dock_direction: "backward"
      rotate_to_dock: true
    placement_dock: #For dropping off a bin next to the house or out on the curb
      plugin: 'opennav_docking::SimpleNonChargingDock'
      use_battery_status: false
      external_detection_timeout: 1.0
      filter_coef: 0.1
      use_stall_detection: false
      docking_threshold: 0.05

    # Docks
    #use_dock_id: true  #Not in kilted?#Easier to reference dock by id/name than by full pose, and allows for multiple docks with the same plugin but different poses. The dock id is specified in the dock database yaml file. This param is mentioned in the nav2 tutorials but not on the params page??????
    dock_database: /home/indie/garbo_ws/src/garbo/config/docks.yaml


    # Dock instances
    #This doesn't throw errors.
    #docks: ['home']  # Input your docks here. Plugin name cannot be the same as dock name.
    #home:
    #  type: 'home_dock'
    #  frame: map
    #  pose: [-5.0, 3.9, 0.0]
    #  id: 'home'

    controller:
      k_phi: 3.0 #Ratio of the rate of change of angle relative to distance from the target. Much be > 0.
      k_delta: 2.0 #Higher values result in converging to the target more quickly.
      k_beta: 0.4 #Parameter to reduce linear velocity proportional to path curvature. Increasing this linearly reduces the velocity (v(t) = v_max / (1 + beta * |curv|^lambda)).
      k_lambda: 2.0 #Parameter to reduce linear velocity proportional to path curvature. Increasing this exponentially reduces the velocity (v(t) = v_max / (1 + beta * |curv|^lambda)).
      v_linear_min: 0.1 #Minimum linear velocity when approaching the dock. This should be set above the stall threshold of the robot to ensure it can overcome static friction and move towards the dock. The ideal value may require some experimentation, but a good starting point is around 0.15 m/s for a heavy robot. Adjust as needed based on testing to find the lowest velocity that still allows reliable movement towards the dock without stalling.
      v_linear_max: 0.25 #Maximum linear velocity when approaching the dock. This can be set to the same value as v_linear_min for a consistent approach speed, or higher if you want the robot to move faster when it is farther from the dock. However, since precision is important in docking, especially as the robot gets closer, it may be best to keep this at the same value as v_linear_min or only slightly higher to ensure a controlled approach.
      v_angular_max: 0.75 #Maximum angular velocity when approaching the dock. This should be set to allow the robot to turn towards the dock effectively without being too aggressive, which could cause overshooting or instability. A good starting point is around 0.5 rad/s, but this may need to be adjusted based on the robot's turning capabilities and the desired approach behavior.
      slowdown_radius: 0.5 #Radius around the dock at which to start slowing down. This should be set based on the expected distance at which the robot needs to start reducing its speed to ensure a smooth and controlled approach to the dock. A good starting point is around 0.5 meters, but this may need to be adjusted based on testing and the specific dynamics of the robot.
      rotate_to_heading_angular_vel: 1.0 #Angular velocity (rad/s) to rotate to the goal heading when rotate_to_dock is enabled.
      rotate_to_heading_max_angular_accel: 3.2 #Max angular acceleration when rotating to the dock heading.
      use_collision_detection: false #Default true. Whether to use collision detection to avoid obstacles.
      costmap_topic: "local_costmap/costmap_raw" #Raw costmap topic for collision checking.
      footprint_topic: "local_costmap/published_footprint" #Topic for footprint in the costmap frame. Footprint will change when bins are carried.
      transform_tolerance: 0.1 #Time with which to post-date the transform that is published, to indicate that this transform is valid into the future.
      projection_time: 5.0 #Time to look ahead for collisions (s).
      simulation_step: 0.1 #Time step for projections (s).
      dock_collision_threshold: 0.0 #default 0.1 The distance from the dock pose to ignore collisions. Set to 0.0 when the dock isn't physically contacted.


loopback_simulator:
  ros__parameters:
    enable_stamped_cmd_vel: true # Manually added parameter
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    map_frame_id: "map"
    scan_frame_id: "base_scan" # tb4_loopback_simulator.launch.py remaps to 'rplidar_link'
    update_duration: 0.02
    scan_range_min: 0.05
    scan_range_max: 30.0
    scan_angle_min: -3.1415
    scan_angle_max: 3.1415
    scan_angle_increment: 0.02617
    scan_use_inf: true

