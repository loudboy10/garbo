# Controller configuration for differential drive robot
#I'm not entirely sure why this is necessary as a stand-alone file.

controller_manager:
  ros__parameters:
    update_rate: 30

    diff_cont:
      type: diff_drive_controller/DiffDriveController


    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster


diff_cont:
  ros__parameters:

    publish_rate: 50.0 #default 50.0

    odom_frame_id: "odom"
    base_frame_id: "base_link"
    publish_odom_tf: true 

    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]
    wheel_separation: 0.425
    wheel_radius: 0.127



