services:
  ros2_dev:
    build:
      context: ../../../
      dockerfile: src/garbo/docker/Dockerfile
      args:
        - ROS_DISTRO=jazzy
    image: garbo:latest
    container_name: garbo_dev
    network_mode: host
    ipc: host
    shm_size: "2gb"
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, utility, display]
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/home/${USER:-user}/.Xauthority
      - GZ_SIM_RESOURCE_PATH=/ros2_ws/src/garbo
      - RCUTILS_COLORIZED_OUTPUT=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-~/.Xauthority}:/home/${USER:-user}/.Xauthority:ro
      - ../../../src:/ros2_ws/src
